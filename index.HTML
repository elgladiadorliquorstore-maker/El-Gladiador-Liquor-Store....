<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Gladiador Liquor Store</title>

    <!-- FUENTE -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('fondo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.75);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* ANIMACIÓN */
        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animar {
            opacity: 0;
            animation: aparecer 1s ease forwards;
        }

        .a1 { animation-delay: 0.3s; }
        .a2 { animation-delay: 0.7s; }
        .a3 { animation-delay: 1.1s; }
        .a4 { animation-delay: 1.5s; }
        .a5 { animation-delay: 1.9s; }

        /* TÍTULO */
        h1 {
            font-size: 55px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, gold, orange, #ffcc00);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(255,215,0,0.7);
        }

        /* FRASES */
        .frase {
            font-size: 20px;
            max-width: 650px;
            margin-bottom: 30px;
            line-height: 1.6;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0,229,255,0.6);
        }

        .frase strong {
            color: #00e5ff;
            font-weight: 700;
        }

        /* BOTONES */
        a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 300px;
            margin: 12px;
            padding: 15px;
            text-decoration: none;
            color: white;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        .facebook {
            background: #1877f2;
        }

        .whatsapp {
            background: #25d366;
        }

        .tiktok {
            background: #000000;
            border: 2px solid #ff0050;
        }

        a:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        img.icon {
            width: 26px;
        }

    </style>
</head>

<body>

<div class="overlay">

    <h1 class="animar a1">El Gladiador<br>Liquor Store</h1>

    <div class="frase animar a2">
        Calidad, variedad y precios bajos en vinos, licores.<br><br>
        <strong>Buen precio y gran sabor, tu mejor elección: El Gladiador.</strong>
    </div>

    <a class="facebook animar a3" href="https://www.facebook.com/share/1GZPaLHMNu/" target="_blank">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
        Facebook
    </a>

    <a class="whatsapp animar a4" href="https://wa.me/593994605086" target="_blank">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        WhatsApp
    </a>

    <a class="tiktok animar a5" href="https://tiktok.com/@elgladiadorliquorstore" target="_blank">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
        TikTok
    </a>

</div>

</body>
</html>
